<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smart Hotel — Reservations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/global.css}"/>
    <link rel="stylesheet" th:href="@{/css/checkin.css}"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="/" class="navbar-brand">🏨 Smart Hotel</a>
    <div class="nav-links">
        <a href="/rooms">Rooms</a>
        <a href="/reservations" class="active">Reservations</a>
        <a href="/logout">Log out</a>
    </div>
</nav>

<div class="page-container">

    <!-- HEADER -->
    <div class="page-header">
        <div class="page-title">📋 Reservations</div>
        <div class="header-stats">
            <div class="header-stat">
                <span class="badge badge-confirmed"
                      th:text="${reservations.size()} + ' Total'">
                </span>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table class="table" th:if="${!#lists.isEmpty(reservations)}">
            <thead>
            <tr>
                <th>Guest</th>
                <th>Room</th>
                <th>Check-in</th>
                <th>Check-out</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="res : ${reservations}">

                <!-- Guest -->
                <td>
                    <div class="guest-name"
                         th:text="${res.guest != null ?
                                       res.guest.fullName : 'N/A'}">
                    </div>
                    <div class="guest-email"
                         th:text="${res.guest != null ?
                                       res.guest.email : ''}">
                    </div>
                </td>

                <!-- Room -->
                <td>
                    <div class="room-badge"
                         th:text="'Room ' + ${res.room.roomNumber}">
                    </div>
                    <div class="room-type"
                         th:text="${res.room.type}">
                    </div>
                </td>

                <!-- Dates -->
                <td th:text="${res.checkInDate}"></td>
                <td th:text="${res.checkOutDate}"></td>

                <!-- Price -->
                <td>
                        <span class="price-val"
                              th:text="${res.totalPrice != null ?
                                        res.totalPrice + ' MAD' : 'N/A'}">
                        </span>
                </td>

                <!-- Status Badge -->
                <td>
                    <div th:switch="${res.status.name()}">
                            <span class="badge badge-pending"
                                  th:case="'PENDING'">Pending</span>
                        <span class="badge badge-confirmed"
                              th:case="'CONFIRMED'">Confirmed</span>
                        <span class="badge badge-checkedin"
                              th:case="'CHECKED_IN'">Checked In</span>
                        <span class="badge badge-checkedout"
                              th:case="'CHECKED_OUT'">Checked Out</span>
                        <span class="badge badge-cancelled"
                              th:case="'CANCELLED'">Cancelled</span>
                    </div>
                </td>

                <!-- ACTIONS -->
                <td>
                    <div class="action-btns">

                        <!-- CONFIRMED → Check In -->
                        <form th:if="${res.status.name() == 'CONFIRMED'}"
                              th:action="@{/checkin/{id}(id=${res.id})}"
                              method="post">
                            <button class="btn btn-success"
                                    style="font-size:12px; padding:5px 12px;">
                                ✓ Check In
                            </button>
                        </form>

                        <!-- CHECKED_IN → Check Out -->
                        <form th:if="${res.status.name() == 'CHECKED_IN'}"
                              th:action="@{/checkout/{id}(id=${res.id})}"
                              method="post">
                            <button class="btn btn-primary"
                                    style="font-size:12px; padding:5px 12px;">
                                ✓ Check Out
                            </button>
                        </form>

                        <!-- CONFIRMED → Cancel -->
                        <form th:if="${res.status.name() == 'CONFIRMED' ||
                                          res.status.name() == 'PENDING'}"
                              th:action="@{/reservations/{id}/cancel(id=${res.id})}"
                              method="post">
                            <button class="btn btn-danger"
                                    style="font-size:12px; padding:5px 12px;">
                                ✗ Cancel
                            </button>
                        </form>

                    </div>
                </td>

            </tr>
            </tbody>
        </table>

        <!-- EMPTY -->
        <div class="empty-state"
             th:if="${#lists.isEmpty(reservations)}">
            <div class="empty-state-icon">📋</div>
            <div>No reservations found</div>
            <a href="/rooms" class="btn btn-primary"
               style="margin-top:12px;">
                Book a Room
            </a>
        </div>
    </div>

</div>
</body>
</html>
